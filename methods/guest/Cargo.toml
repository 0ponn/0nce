[package]
name = "guest"
version = "0.0.0"
edition = "2021"

[[bin]]
name = "guest"
path = "src/main.rs"

[dependencies]
risc0-zkvm = { version = "1", default-features = false, features = ["std"] }
# Per SPEC.md guardrails: dependencies are added when their corresponding §4
# step is implemented, not pre-emptively. Expected additions, in order:
#   §4.3 (canonicalization)   — pure stdlib, no dep
#   §4.4 (SHA-256 of body)    — risc0 sha2 accelerator or sha2 crate
#   §4.6 (RSA verify)         — rsa crate (verify only) + bigint syscalls
#   §4.7 (Poseidon nullifier) — light-poseidon (BN254, Circom/Iden3 params)

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
